<!doctype html>
<html lang="zh">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Tour Avatar</title>
    <link rel="stylesheet" href="style.css" />

    <!--
        IMPORTANT: 离线场景请把 three.js 与 three-vrm 下载到 vendor/ 下，
        然后改 importmap 指向本地。CDN 仅用于开发阶段。
        Offline deployments: vendor three.js + three-vrm under vendor/ and
        update the import map. CDN is for development only.
    -->
    <script type="importmap">
    {
        "imports": {
            "three":              "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/":      "https://unpkg.com/three@0.160.0/examples/jsm/",
            "three-vrm":          "https://unpkg.com/@pixiv/three-vrm@2.0.7/lib/three-vrm.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="stage"></div>
    <div id="badge" aria-hidden="true">
        <span class="dot"></span>
        <span id="badgeText">就绪</span>
    </div>

    <script type="module" src="avatar.js"></script>
</body>
</html>
